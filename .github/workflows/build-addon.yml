name: Auto Build Addon + Update Manifest

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # HAPUS cache: npm karena tidak ada package.json

      - name: Set Minecraft Version
        id: mcversion
        run: |
          VERSION="1.21.124.2"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "MC_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create update script
        run: |
          mkdir -p scripts
          cat > scripts/update_manifest.js << 'EOF'
          const fs = require("fs");

          console.log("🔧 Starting manifest update...");

          const manifests = [
            "ClearLagg-Addon/behavior_packs/ClearLagg_BP/manifest.json",
            "ClearLagg-Addon/resource_packs/ClearLagg_RP/manifest.json"
          ];

          manifests.forEach(filePath => {
            if (!fs.existsSync(filePath)) {
              console.log("❌ File not found:", filePath);
              return;
            }

            try {
              const data = JSON.parse(fs.readFileSync(filePath, "utf8"));
              console.log("📝 Updating:", filePath);

              // Update version
              if (data.header && data.header.version) {
                const v = data.header.version;
                data.header.version = [v[0] || 1, v[1] || 0, (v[2] || 0) + 1];
                console.log("   ✅ Version:", data.header.version);
              }

              // Update min engine version
              if (data.header) {
                data.header.min_engine_version = [1, 21, 0];
                console.log("   ✅ Min engine version:", data.header.min_engine_version);
              }

              fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
              console.log("💾 Saved:", filePath);

            } catch (error) {
              console.log("❌ Error:", filePath, error.message);
            }
          });

          console.log("🎉 Manifest update completed!");
          EOF

      - name: Update Manifests
        run: node scripts/update_manifest.js

      - name: Validate JSON files
        run: |
          echo "🔍 Validating JSON files..."
          find ClearLagg-Addon -name "*.json" | while read file; do
            if python -m json.tool "$file" > /dev/null 2>&1; then
              echo "✅ Valid: $file"
            else
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done

      - name: Create MCADDON Package
        run: |
          echo "📦 Creating MCADDON package..."
          
          # Check if ClearLagg-Addon directory exists
          if [ ! -d "ClearLagg-Addon" ]; then
            echo "❌ ClearLagg-Addon directory not found!"
            echo "Current directory structure:"
            ls -la
            exit 1
          fi
          
          # Create MCADDON
          cd ClearLagg-Addon
          zip -r ../ClearLagg_Addon.mcaddon behavior_packs resource_packs
          
          cd ..
          echo "✅ MCADDON created successfully!"
          ls -la *.mcaddon

      - name: Create separate pack files
        run: |
          echo "📁 Creating separate pack files..."
          
          # Create behavior pack
          cd ClearLagg-Addon/behavior_packs
          zip -r ../../ClearLagg_Behavior.mcpack *
          
          # Create resource pack
          cd ../resource_packs
          zip -r ../../ClearLagg_Resource.mcpack *
          
          cd ../..
          echo "✅ Separate packs created!"
          ls -la *.mcpack

      - name: Verify artifacts
        run: |
          echo "🔍 Verifying build artifacts..."
          [ -f "ClearLagg_Addon.mcaddon" ] && echo "✅ ClearLagg_Addon.mcaddon" || echo "❌ MCADDON missing"
          [ -f "ClearLagg_Behavior.mcpack" ] && echo "✅ ClearLagg_Behavior.mcpack" || echo "❌ Behavior pack missing"
          [ -f "ClearLagg_Resource.mcpack" ] && echo "✅ ClearLagg_Resource.mcpack" || echo "❌ Resource pack missing"
          
          echo "📊 File sizes:"
          ls -lh *.mcaddon *.mcpack

      - name: Create Git Tag
        id: tag_version
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          git tag $TAG_NAME || echo "Tag creation failed, continuing..."
          git push origin $TAG_NAME || echo "Tag push failed, continuing..."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.tag_name }}
          name: "ClearLagg Addon ${{ steps.tag_version.outputs.tag_name }}"
          body: |
            ## 🧹 ClearLagg Addon for Minecraft Bedrock
            
            **Build:** #${{ github.run_number }}  
            **Minecraft Version:** 1.21.124.2  
            **Build Date:** $(date +'%Y-%m-%d %H:%M:%S')
            
            ### 📦 Download Files:
            - **`ClearLagg_Addon.mcaddon`** - Complete addon package (recommended)
            - **`ClearLagg_Behavior.mcpack`** - Behavior pack only
            - **`ClearLagg_Resource.mcpack`** - Resource pack only
            
            ### 🚀 Installation:
            1. Download `ClearLagg_Addon.mcaddon`
            2. Double-click to import to Minecraft
            3. Activate in world settings
            4. Enjoy lag-free gameplay!
            
            ### 🎯 Features:
            ✅ Automatic item clearing  
            ✅ Progress bar display  
            ✅ Chat history system  
            ✅ Customizable intervals  
            ✅ Support Minecraft 1.21.124.2
            
            ---
            *Automatically built with GitHub Actions*
          files: |
            ClearLagg_Addon.mcaddon
            ClearLagg_Behavior.mcpack
            ClearLagg_Resource.mcpack
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
