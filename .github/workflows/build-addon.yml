name: 🧹 ClearLag Addon - Auto Build & Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

env:
  ADDON_NAME: "ClearLagg"
  MC_VERSION: "1.21.124.2"
  NODE_VERSION: "18"

jobs:
  welcome:
    name: "🎉 Welcome & Setup"
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.timestamp.outputs.time }}
      run_id: ${{ github.run_id }}
    steps:
      - name: Display Welcome ASCII Art
        run: |
          echo "
          ╔═══════════════════════════════════════════════╗
          ║              🧹 CLEARLAG ADDON               ║
          ║           Minecraft Bedrock Edition          ║
          ║                                               ║
          ║    🚀 Auto Build System - GitHub Actions     ║
          ║    📦 MCADDON Generator + Release Manager    ║
          ║    🎯 Version: ${{ env.MC_VERSION }}         ║
          ║    👨‍💻 Triggered by: ${{ github.actor }}      ║
          ╚═══════════════════════════════════════════════╝
          "
          echo "📅 Build started at: $(date)"
          echo "🔧 Workflow: ${{ github.workflow }}"
          echo "📝 Commit: ${{ github.event.head_commit.message }}"

      - name: Generate Timestamp
        id: timestamp
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

  validation:
    name: "🔍 Validation & Setup"
    runs-on: ubuntu-latest
    needs: welcome
    outputs:
      version_type: ${{ steps.detect_version.outputs.version_type }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Hapus cache npm karena tidak ada package.json

      - name: Validate Repository Structure
        id: validate_structure
        run: |
          echo "🔍 Validating repository structure..."
          
          # Check essential directories
          REQUIRED_DIRS=(
            "ClearLagg-Addon/behavior_packs/ClearLagg_BP"
            "ClearLagg-Addon/resource_packs/ClearLagg_RP"
          )
          
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ Directory found: $dir"
            else
              echo "❌ Missing directory: $dir"
              exit 1
            fi
          done
          
          # Check essential files
          REQUIRED_FILES=(
            "ClearLagg-Addon/behavior_packs/ClearLagg_BP/manifest.json"
            "ClearLagg-Addon/resource_packs/ClearLagg_RP/manifest.json"
          )
          
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ File found: $file"
            else
              echo "❌ Missing file: $file"
              exit 1
            fi
          done
          
          echo "🎯 Repository structure validation completed!"

      - name: Detect Version Bump Type
        id: detect_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION_TYPE="${{ github.event.inputs.version_bump }}"
          else
            # Analyze commit message to determine version bump type
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            case "${COMMIT_MSG}" in
              *"[major]"*|*"breaking"*|*"BREAKING"*) VERSION_TYPE="major" ;;
              *"[minor]"*|*"feat"*|*"feature"*) VERSION_TYPE="minor" ;;
              *) VERSION_TYPE="patch" ;;
            esac
          fi
          echo "version_type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "📈 Version bump type: $VERSION_TYPE"

  build:
    name: "🏗️ Build & Package"
    runs-on: ubuntu-latest
    needs: [welcome, validation]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Display Build Header
        run: |
          echo "
          ╔═══════════════════════════════════════════════╗
          ║                🏗️ BUILD PHASE                ║
          ║            Packaging Minecraft Addon         ║
          ╚═══════════════════════════════════════════════╝
          "

      - name: Create Advanced Update Script
        run: |
          mkdir -p scripts
          cat > scripts/update_manifest.js << 'EOF'
          const fs = require("fs");
          const path = require("path");

          // Color codes for terminal output
          const colors = {
            reset: "\x1b[0m",
            bright: "\x1b[1m",
            red: "\x1b[31m",
            green: "\x1b[32m",
            yellow: "\x1b[33m",
            blue: "\x1b[34m",
            magenta: "\x1b[35m",
            cyan: "\x1b[36m"
          };

          function log(message, color = colors.reset) {
            console.log(color + message + colors.reset);
          }

          function logSuccess(message) {
            log("✅ " + message, colors.green);
          }

          function logError(message) {
            log("❌ " + message, colors.red);
          }

          function logInfo(message) {
            log("🔧 " + message, colors.blue);
          }

          function logWarning(message) {
            log("⚠️ " + message, colors.yellow);
          }

          logInfo("Starting advanced manifest update process...");
          log("📦 Addon: ClearLagg");
          log("🎯 Minecraft Version: 1.21.124.2");

          const manifests = [
            {
              path: "ClearLagg-Addon/behavior_packs/ClearLagg_BP/manifest.json",
              type: "Behavior Pack"
            },
            {
              path: "ClearLagg-Addon/resource_packs/ClearLagg_RP/manifest.json",
              type: "Resource Pack"
            }
          ];

          let totalUpdated = 0;

          manifests.forEach(({path: filePath, type}) => {
            logInfo(`Processing ${type}: ${filePath}`);
            
            if (!fs.existsSync(filePath)) {
              logError(`File not found: ${filePath}`);
              return;
            }

            try {
              const data = JSON.parse(fs.readFileSync(filePath, "utf8"));
              
              // Store original version for logging
              const originalVersion = data.header?.version ? [...data.header.version] : [1, 0, 0];
              
              // Update version based on bump type
              const versionBump = "${{ needs.validation.outputs.version_type }}" || "patch";
              
              if (data.header && data.header.version) {
                const v = data.header.version;
                
                switch(versionBump) {
                  case "major":
                    data.header.version = [(v[0] || 1) + 1, 0, 0];
                    break;
                  case "minor":
                    data.header.version = [v[0] || 1, (v[1] || 0) + 1, 0];
                    break;
                  case "patch":
                  default:
                    data.header.version = [v[0] || 1, v[1] || 0, (v[2] || 0) + 1];
                    break;
                }
                
                logSuccess(`${type} version: ${originalVersion.join('.')} → ${data.header.version.join('.')} (${versionBump})`);
              }

              // Update min engine version
              if (data.header) {
                data.header.min_engine_version = [1, 21, 0];
                logInfo(`${type} min engine version: ${data.header.min_engine_version.join('.')}`);
              }

              // Update metadata
              data.header.name = data.header.name || "ClearLagg " + type;
              data.header.description = data.header.description || "Lag reduction system for Minecraft Bedrock";
              
              // Write updated manifest
              fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
              logSuccess(`Successfully updated: ${filePath}`);
              totalUpdated++;

            } catch (error) {
              logError(`Failed to process ${filePath}: ${error.message}`);
            }
          });

          if (totalUpdated === manifests.length) {
            logSuccess("🎉 All manifests updated successfully!");
          } else {
            logWarning(`Updated ${totalUpdated}/${manifests.length} manifests`);
          }
          EOF

      - name: Update Manifests with Version Bump
        run: node scripts/update_manifest.js

      - name: Validate JSON Syntax
        run: |
          echo "🔍 Validating JSON files..."
          find ClearLagg-Addon -name "*.json" | while read file; do
            echo "📄 Validating: $file"
            if python -m json.tool "$file" > /dev/null 2>&1; then
              echo "✅ Valid JSON: $file"
            else
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "🎉 All JSON files are valid!"

      - name: Create MCADDON Package
        run: |
          echo "📦 Creating MCADDON package..."
          echo "=========================================="
          
          # Display package structure
          echo "📁 Package Structure:"
          echo "ClearLagg-Addon/"
          echo "├── behavior_packs/"
          echo "│   └── ClearLagg_BP/"
          find ClearLagg-Addon/behavior_packs/ClearLagg_BP -type f | head -5 | sed 's/^/│       ├── /'
          echo "└── resource_packs/"
          echo "    └── ClearLagg_RP/"
          find ClearLagg-Addon/resource_packs/ClearLagg_RP -type f | head -5 | sed 's/^/        ├── /'
          echo ""
          
          # Create the MCADDON file
          cd ClearLagg-Addon
          zip -r ../ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon behavior_packs resource_packs
          cd ..
          
          # Verify the package
          if [ -f "ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon" ]; then
            echo "✅ MCADDON package created successfully!"
            echo "📊 File size: $(du -h ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon | cut -f1)"
          else
            echo "❌ Failed to create MCADDON package"
            exit 1
          fi

      - name: Create Separate Packages
        run: |
          echo "📁 Creating separate package files..."
          echo "=========================================="
          
          # Behavior Pack
          echo "🎯 Creating Behavior Pack..."
          cd ClearLagg-Addon/behavior_packs
          zip -r ../../ClearLagg_BehaviorPack_v1.0.${{ github.run_number }}.zip ClearLagg_BP
          cd ../..
          echo "✅ Behavior Pack created"
          
          # Resource Pack
          echo "🎨 Creating Resource Pack..."
          cd ClearLagg-Addon/resource_packs
          zip -r ../../ClearLagg_ResourcePack_v1.0.${{ github.run_number }}.zip ClearLagg_RP
          cd ../..
          echo "✅ Resource Pack created"
          
          # Display file information
          echo ""
          echo "📦 Generated Packages:"
          ls -lh *.mcaddon *.zip | awk '{print "📄 " $9 " - " $5}'

      - name: Verify Build Artifacts
        run: |
          echo "🔍 Verifying build artifacts..."
          echo "=========================================="
          
          ARTIFACTS=(
            "ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon"
            "ClearLagg_BehaviorPack_v1.0.${{ github.run_number }}.zip"
            "ClearLagg_ResourcePack_v1.0.${{ github.run_number }}.zip"
          )
          
          all_good=true
          for artifact in "${ARTIFACTS[@]}"; do
            if [ -f "$artifact" ]; then
              size=$(du -h "$artifact" | cut -f1)
              echo "✅ $artifact - $size"
              
              # Basic file validation
              if [ "$(wc -c < "$artifact")" -lt 100 ]; then
                echo "❌ $artifact seems too small, might be corrupted"
                all_good=false
              fi
            else
              echo "❌ $artifact - MISSING"
              all_good=false
            fi
          done
          
          if [ "$all_good" = true ]; then
            echo "🎉 All artifacts verified successfully!"
          else
            echo "💥 Some artifacts failed verification"
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clearlagg-addon-files
          path: |
            ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon
            ClearLagg_BehaviorPack_v1.0.${{ github.run_number }}.zip
            ClearLagg_ResourcePack_v1.0.${{ github.run_number }}.zip
          retention-days: 7

  release:
    name: "🚀 Create Release"
    runs-on: ubuntu-latest
    needs: [welcome, build]
    if: success()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: clearlagg-addon-files
          path: ./artifacts

      - name: Display Release Header
        run: |
          echo "
          ╔═══════════════════════════════════════════════╗
          ║                🚀 RELEASE PHASE              ║
          ║         Publishing to GitHub Releases        ║
          ╚═══════════════════════════════════════════════╝
          "

      - name: List Downloaded Artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          find ./artifacts -type f -name "*.mcaddon" -o -name "*.zip" | while read file; do
            echo "✅ $(basename "$file") - $(du -h "$file" | cut -f1)"
          done

      - name: Generate Release Notes
        id: generate_notes
        run: |
          cat > release_notes.md << EOF
          # 🧹 ClearLagg Addon v1.0.${{ github.run_number }}
          
          ## 🎯 Minecraft Performance Enhancement
          
          **Automated Build** • **Version 1.0.${{ github.run_number }}** • **Minecraft ${{ env.MC_VERSION }}**
          
          ### 📊 Build Information
          - **Build Number:** #${{ github.run_number }}
          - **Build Date:** ${{ needs.welcome.outputs.timestamp }}
          - **Minecraft Version:** ${{ env.MC_VERSION }}
          - **Version Bump:** ${{ needs.validation.outputs.version_type }}
          - **Triggered by:** ${{ github.actor }}
          - **Commit:** \`${{ github.sha }}\`
          
          ### 📦 Available Downloads
          
          | File | Type | Description |
          |------|------|-------------|
          | \`ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon\` | Complete Package | 🎯 **Recommended** - Easy one-click install |
          | \`ClearLagg_BehaviorPack_v1.0.${{ github.run_number }}.zip\` | Behavior Pack | Contains all game logic and functionality |
          | \`ClearLagg_ResourcePack_v1.0.${{ github.run_number }}.zip\` | Resource Pack | Contains textures, sounds, and visuals |
          
          ### 🚀 Installation Guide
          
          #### Method 1: MCADDON (Recommended)
          1. Download \`ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon\`
          2. Double-click the file to automatically import into Minecraft
          3. Activate in your world settings under "Behavior Packs" and "Resource Packs"
          4. Enjoy lag-free gameplay! 🎮
          
          #### Method 2: Manual Installation
          1. Download both ZIP files
          2. Extract them to your Minecraft development_behavior_packs and development_resource_packs folders
          3. Activate in world settings
          
          ### 🔧 Features
          - ✅ Automatic entity cleanup
          - ✅ Performance optimization
          - ✅ Compatible with Minecraft Bedrock ${{ env.MC_VERSION }}
          - ✅ Regular updates and maintenance
          
          ### 📁 File Structure
          \`\`\`
          ClearLagg-Addon/
          ├── behavior_packs/ClearLagg_BP/
          │   ├── manifest.json
          │   ├── pack_icon.png
          │   └── (game logic files)
          └── resource_packs/ClearLagg_RP/
              ├── manifest.json
              ├── pack_icon.png
              └── (resource files)
          \`\`\`
          
          ---
          *🤖 Automatically built with GitHub Actions • 🕒 ${{ needs.welcome.outputs.timestamp }}*
          EOF
          
          echo "Release notes generated successfully!"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "ClearLagg Addon v1.0.${{ github.run_number }}"
          body_path: release_notes.md
          files: |
            artifacts/ClearLagg_Addon_v1.0.${{ github.run_number }}.mcaddon
            artifacts/ClearLagg_BehaviorPack_v1.0.${{ github.run_number }}.zip
            artifacts/ClearLagg_ResourcePack_v1.0.${{ github.run_number }}.zip
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  completion:
    name: "🎉 Build Complete"
    runs-on: ubuntu-latest
    needs: [welcome, build, release]
    if: always()
    steps:
      - name: Display Completion Message
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.release.result }}" == "success" ]; then
            echo "
            ╔═══════════════════════════════════════════════╗
            ║               🎉 BUILD COMPLETE!            ║
            ║          ClearLagg Addon Successfully        ║
            ║              Built & Released!               ║
            ║                                               ║
            ║    📦 Release: v1.0.${{ github.run_number }} ║
            ║    🎮 Minecraft: ${{ env.MC_VERSION }}       ║
            ║    👤 By: ${{ github.actor }}                ║
            ║                                               ║
            ║    🌐 Check the Releases page for download   ║
            ╚═══════════════════════════════════════════════╝
            "
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "
            ╔═══════════════════════════════════════════════╗
            ║               💥 BUILD FAILED!              ║
            ║           Check the build logs               ║
            ╚═══════════════════════════════════════════════╝
            "
            exit 1
          elif [ "${{ needs.release.result }}" == "failure" ]; then
            echo "
            ╔═══════════════════════════════════════════════╗
            ║              ⚠️ RELEASE FAILED!             ║
            ║        Build succeeded but release failed    ║
            ╚═══════════════════════════════════════════════╝
            "
            exit 1
          else
            echo "
            ╔═══════════════════════════════════════════════╗
            ║                 ❓ UNKNOWN STATUS            ║
            ║          Check workflow for details          ║
            ╚═══════════════════════════════════════════════╝
            "
            exit 1
          fi

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            scripts/
            ClearLagg-Addon/
          retention-days: 3
