name: 🚀 Auto Build ClearLagg Addon & Update Manifest

# ----------------------------------------------------------------------
# 📢 Penjelasan Workflow
# ----------------------------------------------------------------------
# Workflow ini dirancang untuk:
# 1. Mengotomatiskan proses build (kompresi .mcaddon dan .zip).
# 2. Secara otomatis meningkatkan versi (patch number) dalam manifest.json 
#    setiap kali ada push ke branch 'main'.
# 3. Membuat Release baru di GitHub dengan file-file yang sudah dibuild.
# ----------------------------------------------------------------------

on:
  # 🎯 Pemicu (Trigger)
  push:
    branches: [ "main" ]
  # 🛠️ Memungkinkan eksekusi manual (Opsional: Hapus jika tidak perlu)
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    # ⚙️ Menentukan shell untuk eksekusi yang lebih seragam
    defaults:
      run:
        shell: bash

    steps:
      # ----------------------------------------------------------------------
      # 💡 Sambutan dan Inisialisasi
      # ----------------------------------------------------------------------
      - name: 👋 Welcome to ClearLagg Build Pipeline!
        run: |
          echo '
             _ _ _____   _        _       
            | | |  ___| | |      | |      
          __| | | |__ __| |_ __  | | ___  
         / _` | |  __|/ _` | _  | |/ _ \ 
        | (_| | | |  | (_| | | | | | (_) |
         \__,_|_|_|   \__,_|_| |_|_|\___/ 
                                       
            ✨ Starting Automated Build for ClearLagg Addon ✨
            -----------------------------------------------------
            Commit: ${{ github.sha }}
            Run ID: ${{ github.run_id }}
            -----------------------------------------------------
          '
          
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4 # Gunakan versi terbaru
        with:
          lfs: true # Penting jika ada file besar (misal: tekstur)

      # ----------------------------------------------------------------------
      # 🛠️ Persiapan Lingkungan
      # ----------------------------------------------------------------------
      - name: 💻 Install Node.js (for Manifest Script)
        uses: actions/setup-node@v4 # Gunakan versi terbaru
        with:
          node-version: 20 # Gunakan versi LTS terbaru
          
      - name: ⚙️ Set Minecraft Target Version
        id: mcversion
        run: |
          # Versi Minecraft yang dijadikan target
          TARGET_VERSION="1.21.0"
          echo "MC_TARGET_VERSION=$TARGET_VERSION" >> $GITHUB_ENV
          echo "Target MC Version: $TARGET_VERSION"
          
      # ----------------------------------------------------------------------
      # 📝 Pembaruan Manifest Otomatis
      # ----------------------------------------------------------------------
      - name: 📄 Create Manifest Update Script (Node.js)
        run: |
          mkdir -p scripts
          cat > scripts/update_manifest.js << 'EOF'
          const fs = require("fs");
          const path = require("path");

          console.log("======================================");
          console.log("       🔧 Manifest Updater Script      ");
          console.log("======================================");
          
          // Daftar path ke file manifest yang perlu diupdate
          const manifests = [
            "ClearLagg-Addon/behavior_packs/ClearLagg_BP/manifest.json",
            "ClearLagg-Addon/resource_packs/ClearLagg_RP/manifest.json"
          ];
          
          // Ambil versi MC dari environment variable
          const minEngineVersion = process.env.MC_TARGET_VERSION || "1.21.0";
          const minEngineArray = minEngineVersion.split('.').map(Number);

          let updatedCount = 0;
          
          manifests.forEach(filePath => {
            if (!fs.existsSync(filePath)) {
              console.log(`❌ File not found: ${filePath}`);
              return;
            }

            try {
              const fileContent = fs.readFileSync(filePath, "utf8");
              const data = JSON.parse(fileContent);
              console.log(`\n📝 Processing: ${filePath}`);

              // 1. Update Versi Addon (Patch number + 1)
              if (data.header && data.header.version) {
                const v = data.header.version;
                // Pastikan versi adalah array 3 elemen, tingkatkan elemen ketiga
                const newVersion = [v[0] || 1, v[1] || 0, (v[2] || 0) + 1]; 
                data.header.version = newVersion;
                console.log(`   ✅ Addon Version Updated: ${newVersion.join('.')}`);
              } else {
                 console.log(`   ⚠️ Header/Version not found.`);
              }

              // 2. Update Minimum Engine Version
              if (data.header) {
                data.header.min_engine_version = minEngineArray;
                console.log(`   ✅ Min Engine Version Set: ${minEngineArray.join('.')}`);
              }

              // Simpan kembali file dengan format JSON yang rapi (indent 2 spasi)
              fs.writeFileSync(filePath, JSON.stringify(data, null, 2) + "\n");
              console.log("   💾 Saved successfully.");
              updatedCount++;

            } catch (error) {
              console.log(`❌ Error processing ${filePath}: ${error.message}`);
            }
          });

          if (updatedCount === 0) {
             console.log("\n⚠️ No manifests were successfully updated.");
             process.exit(1); # Gagal jika tidak ada yang terupdate
          } else {
             console.log(`\n🎉 Manifest Update Completed! ${updatedCount} files updated.`);
          }
          EOF
        env:
          MC_TARGET_VERSION: ${{ env.MC_TARGET_VERSION }} # Teruskan variable ke Node.js

      - name: 🔁 Run Manifest Update Script
        run: node scripts/update_manifest.js
        env:
          MC_TARGET_VERSION: ${{ env.MC_TARGET_VERSION }} # Pastikan variable tersedia di sini

      - name: 🧐 Validate All JSON Files
        # Memastikan semua JSON valid setelah di-update
        run: |
          echo "🔍 Validating JSON syntax across ClearLagg-Addon directory..."
          find ClearLagg-Addon -name "*.json" -exec python3 -m json.tool {} > /dev/null \;
          echo "✅ All JSON files are valid."
          
      # ----------------------------------------------------------------------
      # 📦 Proses Packaging
      # ----------------------------------------------------------------------
      - name: 🎁 Create .mcaddon and Separate .zip Packages
        run: |
          echo "📦 Starting Addon Packaging..."
          
          # 1. Membuat .mcaddon (Complete Addon)
          cd ClearLagg-Addon
          zip -r ../ClearLagg_Addon.mcaddon behavior_packs resource_packs
          echo "✅ ClearLagg_Addon.mcaddon created."
          
          # 2. Membuat ZIP untuk Behavior Pack
          cd behavior_packs
          zip -r ../../../ClearLagg_BP.zip ClearLagg_BP
          echo "✅ ClearLagg_BP.zip created."
          
          # 3. Membuat ZIP untuk Resource Pack
          cd ../resource_packs
          zip -r ../../../ClearLagg_RP.zip ClearLagg_RP
          echo "✅ ClearLagg_RP.zip created."
          
          cd ../../.. # Kembali ke root repo
          
          echo "======================================"
          echo "   Final Build Artifacts: "
          ls -lh ClearLagg_Addon.mcaddon ClearLagg_BP.zip ClearLagg_RP.zip 2>/dev/null
          echo "======================================"
          
      # ----------------------------------------------------------------------
      # 🚀 Pembuatan GitHub Release
      # ----------------------------------------------------------------------
      - name: 🏷️ Create and Publish GitHub Release
        uses: softprops/action-gh-release@v2 # Gunakan versi terbaru
        with:
          # Tag berdasarkan Major.Minor.GitHubRunNumber
          tag_name: v1.0.${{ github.run_number }}
          name: "✨ ClearLagg Addon v1.0.${{ github.run_number }}"
          body: |
            ## 🧹 ClearLagg Addon for Minecraft Bedrock
            
            **Build Details:**
            * **Release Tag:** `v1.0.${{ github.run_number }}`
            * **Commit Hash:** `${{ github.sha }}`
            * **Target Minecraft Version:** `${{ env.MC_TARGET_VERSION }}`
            * **Date:** $(date +'%Y-%m-%d %H:%M:%S %Z')
            
            ---
            ### 📦 File Downloads:
            | File Name | Description |
            | :--- | :--- |
            | `ClearLagg_Addon.mcaddon` | **Complete Addon Package (Recommended)** |
            | `ClearLagg_BP.zip` | Behavior Pack Only |
            | `ClearLagg_RP.zip` | Resource Pack Only |
            
            ### 🛠️ Perubahan Otomatis:
            * Nomor Patch Addon di `manifest.json` telah dinaikkan secara otomatis.
            * `min_engine_version` diatur ke `${{ env.MC_TARGET_VERSION }}`.
            
            ### 🚀 Cara Penggunaan:
            1. Unduh file **`.mcaddon`** (disarankan).
            2. Klik dua kali file tersebut untuk mengimpor ke Minecraft Bedrock.
            3. Aktifkan **Behavior Pack** di World Settings.
            4. Pastikan fitur **'Holiday Creator Features'** atau sejenisnya diaktifkan jika addon menggunakan fungsi eksperimental.
            5. Nikmati permainan bebas lag!
            
            ---
            *Automated build powered by GitHub Actions. 🤖*
          # List file yang akan diunggah
          files: |
            ClearLagg_Addon.mcaddon
            ClearLagg_BP.zip
            ClearLagg_RP.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
