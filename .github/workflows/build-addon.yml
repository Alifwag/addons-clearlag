name: Auto Build Addon + Update Manifest

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ← PERMISSION YANG DITAMBAHKAN

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Set Minecraft Version
        id: mcversion
        run: |
          VERSION="1.21.124.2"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "MC_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create update script
        run: |
          mkdir -p scripts
          cat > scripts/update_manifest.js << 'EOF'
          const fs = require("fs");

          console.log("🔧 Starting manifest update...");

          const manifests = [
            "ClearLagg-Addon/behavior_packs/ClearLagg_BP/manifest.json",
            "ClearLagg-Addon/resource_packs/ClearLagg_RP/manifest.json"
          ];

          manifests.forEach(filePath => {
            if (!fs.existsSync(filePath)) {
              console.log("❌ File not found:", filePath);
              return;
            }

            try {
              const data = JSON.parse(fs.readFileSync(filePath, "utf8"));
              console.log("📝 Updating:", filePath);

              // Update version
              if (data.header && data.header.version) {
                const v = data.header.version;
                data.header.version = [v[0] || 1, v[1] || 0, (v[2] || 0) + 1];
                console.log("   ✅ Version:", data.header.version);
              }

              // Update min engine version
              if (data.header) {
                data.header.min_engine_version = [1, 21, 0];
                console.log("   ✅ Min engine version:", data.header.min_engine_version);
              }

              fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
              console.log("💾 Saved:", filePath);

            } catch (error) {
              console.log("❌ Error:", filePath, error.message);
            }
          });

          console.log("🎉 Manifest update completed!");
          EOF

      - name: Update Manifests
        run: node scripts/update_manifest.js

      - name: Validate JSON
        run: |
          find ClearLagg-Addon -name "*.json" | while read file; do
            echo "Validating $file"
            python -m json.tool "$file" > /dev/null || echo "❌ Invalid JSON: $file"
          done

      - name: Create MCADDON Package
        run: |
          echo "📦 Packaging MCADDON..."
          
          # Create MCADDON
          cd ClearLagg-Addon
          zip -r ../ClearLagg_Addon.mcaddon behavior_packs resource_packs
          
          cd ..
          echo "✅ MCADDON created!"
          ls -la *.mcaddon

      - name: Create Separate ZIPs
        run: |
          echo "📁 Creating separate ZIP files..."
          
          # Behavior Pack ZIP
          cd ClearLagg-Addon/behavior_packs
          zip -r ../../ClearLagg_BP.zip ClearLagg_BP
          
          # Resource Pack ZIP  
          cd ../resource_packs
          zip -r ../../ClearLagg_RP.zip ClearLagg_RP
          
          cd ../..
          echo "✅ Separate ZIPs created"
          ls -la *.zip

      - name: Verify Artifacts
        run: |
          echo "🔍 Verifying build artifacts..."
          [ -f "ClearLagg_Addon.mcaddon" ] && echo "✅ MCADDON found" || echo "❌ MCADDON missing"
          [ -f "ClearLagg_BP.zip" ] && echo "✅ BP ZIP found" || echo "❌ BP ZIP missing"
          [ -f "ClearLagg_RP.zip" ] && echo "✅ RP ZIP found" || echo "❌ RP ZIP missing"
          
          echo "=== File sizes ==="
          ls -lh *.mcaddon *.zip

      - name: Create Git Tag
        id: tag_version
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          git tag $TAG_NAME
          git push origin $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.tag_name }}
          name: "ClearLagg Addon ${{ steps.tag_version.outputs.tag_name }}"
          body: |
            ## 🧹 ClearLagg Addon for Minecraft Bedrock
            
            **Build:** #${{ github.run_number }}  
            **Minecraft:** 1.21.124.2  
            **Date:** $(date +'%Y-%m-%d %H:%M:%S')
            
            ### 📦 Files:
            - `ClearLagg_Addon.mcaddon` - Complete addon (recommended)
            - `ClearLagg_BP.zip` - Behavior pack only
            - `ClearLagg_RP.zip` - Resource pack only
            
            ### 🚀 Installation:
            1. Download `ClearLagg_Addon.mcaddon`
            2. Double-click to import to Minecraft
            3. Activate in world settings
            4. Enjoy lag-free gameplay!
            
            ---
            *Automatically built with GitHub Actions*
          files: |
            ClearLagg_Addon.mcaddon
            ClearLagg_BP.zip
            ClearLagg_RP.zip
          draft: false
          prerelease: false
